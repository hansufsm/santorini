name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject build info into footer
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(git log -1 --format="%ci" | sed 's/ +.*//' | sed 's/ /T/' | cut -c1-16)
          echo "Commit: $COMMIT  Date: $DATE"
          sed -i "s/__GIT_COMMIT__/${COMMIT}/g" index.html
          sed -i "s/__GIT_DATE__/${DATE} UTC/g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
